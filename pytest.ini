[pytest]
minversion = 7.0
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
testpaths = tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    speech: marks tests related to speech
    llm: marks tests related to LLM
    flight: marks tests related to flight API
    booking: marks tests related to booking
